[project]
name = "lfric-atmosphere-training"
version = "0.1.0"
description = "Training materials for Momentum LFRic Atmosphere."
readme = "README.md"
requires-python = ">=3.11,<3.13"
dependencies = [
  "sphinx>=7,<9",
  "pydata-sphinx-theme",
  "sphinx-toolbox<4",
  "sphinxcontrib-video",
  "sphinxcontrib-quizdown @ git+https://github.com/bonartm/sphinxcontrib-quizdown.git",
  "sphinx-lint",
]

[project.optional-dependencies]
notebooks = [
  "jupyterlab",
  "scitools-iris",
  "geovista",
  "vtk",
  "ipyvtklink",
  "jupytext==1.14.4",
  "esmf-regrid",
  "numpy<2",
]

dev = [
  "pre-commit",
]

[tool.uv]
package = false
