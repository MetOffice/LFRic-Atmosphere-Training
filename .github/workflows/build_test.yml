name: Build Test

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - main

jobs:
  build:
    name: Build Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup conda authentication with Met Office Artifactory
        run: |
          cat > ~/.netrc << EOF
          machine ${MO_ARTIFACTORY}
          password ${{ secrets.ARTIFACTORY_API_KEY }}
          EOF
          chmod 0600 ~/.netrc

      - name: Set up conda environment
        run: |
          conda update conda
          conda env create --name  lfric-atmos-training --file environment.yml

      - name: Build Documentation
        run: |
          eval "$(conda shell.bash hook)"
          conda activate  lfric-atmos-training
          make html
