name: Test documentation

on:
  pull_request:
  push:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  documentation-building:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - name: Check rst source line length to be at most 93
        run: |
          max_line_length=$(find source -name '*.rst' -exec awk 'NF > max {max = NF} END {print max}' {} +)
          test "${max_line_length}" -le 93

      - name: Install uv and Set up Python
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.11"
          enable-cache: true

      - name: Install documentation system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --yes graphviz

      - name: Install dependencies from pyproject.toml
        run: |
          uv sync --extra dev

      - name: Lint Restructured Text
        run: uv run doc8 source/

      - name: Test documentation building
        run: |
          uv run make clean html linkcheck SPHINXOPTS='-Wn'
