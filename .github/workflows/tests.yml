name: Test documentation

on:
  pull_request:
  push:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  documentation-building:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Install uv and Set up Python
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.11"
          enable-cache: true

      - name: Install documentation system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --yes graphviz

      - name: Install dependencies from pyproject.toml
        run: |
          uv sync

      - name: Test documentation building
        run: |
          uv run make clean html linkcheck SPHINXOPTS='-Wn'

  notebook-execution:
    runs-on: ubuntu-latest
    env:
      LIBGL_ALWAYS_SOFTWARE: "1"
      MPLBACKEND: Agg
      PYVISTA_JUPYTER_BACKEND: static
      PYVISTA_OFF_SCREEN: "true"

    steps:
      - uses: actions/checkout@v6

      - name: Install headless rendering libraries
        run: |
          sudo apt-get update
          sudo apt-get install --yes libegl1 libosmesa6

      - name: Set up notebook environment
        uses: mamba-org/setup-micromamba@v2
        with:
          environment-name: lfric-notebooks
          create-args: >-
            python=3.11
            esmpy
            cartopy
            cf-units
            pip
          cache-environment: true

      - name: Install notebook dependencies from pyproject.toml
        shell: bash -el {0}
        run: |
          python -m pip install -e ".[notebooks]"

      - name: Execute notebooks
        shell: bash -el {0}
        run: |
          bash notebooks/test/execute_notebooks.sh
