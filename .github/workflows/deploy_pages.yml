# This workflow will build and deploy documentation to GitHub Pages
name: Deploy documentation to GitHub Pages

# Controls when the workflow will run
on:
  # Triggers the workflow when develop is updated
  push:
    branches: ["main"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

env:
  ENV_NAME: lfric-atmos-training

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  # This workflow contains a single job called "build"
  build:
    # The type of runner that the job will run on
    runs-on: ubuntu-latest

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - uses: actions/checkout@v4

      # Runs a single command using the runners shell
      - name: Set up Artifactory credentials
        uses: MetOffice/action-setup-artifactory@v1
        with:
          username: ""
          api-key: ${{ secrets.ARTIFACTORY_API_KEY }}

      - name: Sort out conda channels in ~/.condarc
        run: |
          conda config --remove channels defaults
          conda config --add channels conda-forge
          conda config --set channel_priority strict

      - name: Create environment for lfric-atmos-training (to build documentation)
        run: |
          conda update conda
          conda env create --name ${ENV_NAME} --file environment.yml

      - name: Build documentation
        run: |
          eval "$(conda shell.bash hook)"
          conda activate ${ENV_NAME}
          make html

      - name: Upload artifacts
        uses: actions/upload-pages-artifact@v3
        with:
          name: github-pages
          path: build/html

  # Deployment job
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

