name: Test Jupyter Notebooks

on:
  pull_request:
    paths: notebooks/**
  push:
    paths: notebooks/**
  workflow_dispatch:

jobs:
  notebook-execution:
    runs-on: ubuntu-latest
    env:
      LIBGL_ALWAYS_SOFTWARE: "1"
      MPLBACKEND: Agg
      PYVISTA_JUPYTER_BACKEND: static
      PYVISTA_OFF_SCREEN: "true"

    steps:
      - uses: actions/checkout@v7

      - name: Install headless rendering libraries
        run: |
          sudo apt-get update
          sudo apt-get install --yes libegl1 libosmesa6

      - name: Set up notebook environment
        uses: mamba-org/setup-micromamba@v3
        with:
          environment-name: lfric-notebooks
          create-args: >-
            python=3.11
            esmpy
            cartopy
            cf-units
            pip
          cache-environment: true

      - name: Install notebook dependencies from pyproject.toml
        shell: bash -el {0}
        run: |
          python -m pip install -e ".[notebooks]"

      - name: Execute notebooks
        shell: bash -el {0}
        run: |
          bash notebooks/test/execute_notebooks.sh
