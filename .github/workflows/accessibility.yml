name: Accessibility checks with Pixi

on:
  pull_request:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  pa11y:
    runs-on: ubuntu-latest

    env:
      PIXI_VERSION: latest
      # pa11y-ci ships Puppeteer 9; use the runner's pre-installed Chrome rather
      # than Puppeteer's (old) bundled Chromium, and skip that download.
      PUPPETEER_SKIP_CHROMIUM_DOWNLOAD: "true"
      PUPPETEER_SKIP_DOWNLOAD: "true"

    steps:
      - uses: actions/checkout@v6

      - name: Install Pixi
        run: |
          curl -fsSL https://pixi.sh/install.sh | sh
          echo "$HOME/.pixi/bin" >> "$GITHUB_PATH"

      - name: Restore Pixi cache
        id: pixi-cache-restore
        uses: actions/cache/restore@v5
        with:
          path: |
            .pixi/envs
            ~/.cache/rattler/cache
            ~/.cache/pixi
          key: ${{ runner.os }}-${{ runner.arch }}-pixi-${{ hashFiles('pixi.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-pixi-

      - name: Build documentation
        run: pixi run --locked sphinx html

      - name: Run pa11y accessibility checks
        run: |
          PUPPETEER_EXECUTABLE_PATH="$(command -v google-chrome || command -v google-chrome-stable || command -v chromium-browser)"
          if [ -z "$PUPPETEER_EXECUTABLE_PATH" ]; then
            echo "::error::No Chrome/Chromium binary found on the runner." >&2
            exit 1
          fi
          echo "Using Chrome at: $PUPPETEER_EXECUTABLE_PATH"
          export PUPPETEER_EXECUTABLE_PATH
          pixi run --locked -e pa11y pa11y

      - name: Save Pixi cache
        if: steps.pixi-cache-restore.outputs.cache-hit != 'true'
        id: pixi-cache-save
        uses: actions/cache/save@v5
        with:
          path: |
            .pixi/envs
            ~/.cache/rattler/cache
            ~/.cache/pixi
          key: ${{ steps.pixi-cache-restore.outputs.cache-primary-key }}
