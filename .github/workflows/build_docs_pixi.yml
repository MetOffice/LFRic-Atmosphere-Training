name: Build documentation with Pixi

on:
  pull_request:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      PIXI_VERSION: latest

    steps:
      - uses: actions/checkout@v6

      - name: Install Pixi
        run: |
          curl -fsSL https://pixi.sh/install.sh | sh
          echo "$HOME/.pixi/bin" >> "$GITHUB_PATH"

      - name: Restore Pixi cache
        id: pixi-cache-restore
        uses: actions/cache/restore@v5
        with:
          path: |
            .pixi/envs
            ~/.cache/rattler/cache
            ~/.cache/pixi
          key: ${{ runner.os }}-${{ runner.arch }}-pixi-${{ hashFiles('pixi.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-pixi-

      - name: Build documentation
        run: pixi run --locked sphinx html

      - name: Save Pixi cache
        if: steps.pixi-cache-restore.outputs.cache-hit != 'true'
        id: pixi-cache-save
        uses: actions/cache/save@v5
        with:
          path: |
            .pixi/envs
            ~/.cache/rattler/cache
            ~/.cache/pixi
          key: ${{ steps.pixi-cache-restore.outputs.cache-primary-key }}
