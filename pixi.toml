[workspace]
name = "lfric-atmosphere-training"
channels = ["conda-forge"]
platforms = ["linux-64", "linux-aarch64", "osx-64", "osx-arm64", "win-64"]

[tasks]
sphinx = { cmd = "sphinx-build -M {{ builder }} source build", args = [{ arg = "builder", default = "help" }], description = "Run a Sphinx make-mode builder. Extra Sphinx options can be passed after --." }
lint = { cmd = "sphinx-lint source", description = "Run sphinx-lint against the documentation sources." }
lab = { cmd = "jupyter lab", cwd = "notebooks/iris-mesh-tutorial/notebooks", description = "Launch JupyterLab in the bundled mesh tutorial notebooks directory." }
install-kernel = { cmd = '''python -m ipykernel install --user --name lfric-mesh --display-name "Python (lfric-mesh)"''', description = "Install the Pixi Python environment as a Jupyter kernel named lfric-mesh." }
mesh-import-check = { cmd = '''python -c "import esmf_regrid, esmpy; print('mesh ok')"''', description = "Verify the mesh tutorial regridding imports are available." }

[dependencies]
python = ">=3.11,<3.13"
sphinx = ">=7,<9"
pydata-sphinx-theme = "*"
sphinx-toolbox = "<4"
sphinxcontrib-video = "*"
sphinx-copybutton = "*"
sphinx-design = "*"
sphinx-lint = "*"
jupyterlab = "*"
scitools-iris = "*"
geovista = "0.5.3.*"
pyvista = ">=0.46.3,<0.47"
vtk = "<9.6"
ipyvtklink = "*"
trame = "*"
trame-vtk = "*"
trame-vuetify = "*"
jupyter-server-proxy = "*"
matplotlib = "*"
jupytext = "1.14.4.*"
iris-esmf-regrid = "*"
numpy = "<2"
pre-commit = "*"
esmpy = "*"

[pypi-dependencies]
sphinxcontrib-quizdown = { git = "https://github.com/bonartm/sphinxcontrib-quizdown.git" }

# Accessibility checking with pa11y-ci. Kept in an isolated environment so the
# Node.js toolchain does not pull into the documentation-build environment.
# Node is capped at < 23: pa11y-ci pulls Puppeteer 9, whose bundled-Chromium
# unpack step breaks on newer Node. CI can instead point at a system Chrome via
# PUPPETEER_EXECUTABLE_PATH (see the accessibility workflow).
[feature.pa11y.dependencies]
nodejs = ">=20,<23"

[feature.pa11y.tasks]
pa11y-install = { cmd = "npm ci", inputs = ["package.json", "package-lock.json"], outputs = ["node_modules/.package-lock.json"], description = "Install the Node tooling (pa11y-ci) used for accessibility checks." }
pa11y = { cmd = "npx pa11y-ci --config .pa11yci.js", depends-on = ["pa11y-install"], description = "Run pa11y-ci accessibility checks over build/html (build it first with 'pixi run sphinx html')." }

[environments]
pa11y = { features = ["pa11y"], no-default-feature = true }
